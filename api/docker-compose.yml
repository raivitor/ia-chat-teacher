services:
  db:
    image: postgres:18
    restart: always
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-boilerplate}']
      interval: 5s
      timeout: 5s
      retries: 20
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=${POSTGRES_DB:-boilerplate}
    volumes:
      - postgres_data:/var/lib/postgresql
    ports:
      - '${POSTGRES_PORT:-5432}:5432'

volumes:
  postgres_data:
